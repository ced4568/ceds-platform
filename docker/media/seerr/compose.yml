services:
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    init: true
    restart: unless-stopped

    environment:
      TZ: America/Chicago
      LOG_LEVEL: info
      PORT: "5055"

    volumes:
      - ./config:/app/config

    ports:
      - "5055:5055"

    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3

    networks:
      - proxy

networks:
  proxy:
    external: true
