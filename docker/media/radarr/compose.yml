services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Chicago
    volumes:
      - ./config:/config
      - /mnt/media:/Media
    ports:
      - "7878:7878"
    networks:
      - proxy

networks:
  proxy:
    external: true
