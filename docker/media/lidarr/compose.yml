services:
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Chicago
    volumes:
      - ./config:/config
      - /mnt/media:/Media
    ports:
      - "8686:8686"
    networks:
      - proxy

networks:
  proxy:
    external: true
