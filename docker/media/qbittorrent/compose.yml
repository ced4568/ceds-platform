services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped

    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Chicago
      WEBUI_PORT: "8080"
      TORRENTING_PORT: "6881"

    volumes:
      - ./config:/config
      - /mnt/media/Downloads:/Media/Downloads

    ports:
      - "8081:8080"
      - "6881:6881"
      - "6881:6881/udp"

    networks:
      - proxy

networks:
  proxy:
    external: true
