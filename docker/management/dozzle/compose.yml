services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped

    environment:
      TZ: America/Chicago

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/data

    ports:
      - "8088:8080"

    networks:
      - proxy

networks:
  proxy:
    external: true
